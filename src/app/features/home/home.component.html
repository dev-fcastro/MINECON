<div class="home-fold">
  <section class="hero">
    <img
      class="hero__img"
      ngSrc="/MineconIMG/header_img.png"
      fill
      priority
      alt="MINECON — Maquinaria Pesada Industrial"
    />
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <app-title variant="display" level="h1" text="MINECON" class="hero__title" />
      <p class="hero__subtitle">
        Representantes de equipos para construcción, minería, industria, transporte y energía en República Dominicana.
      </p>
      <div class="hero__actions">
        <a routerLink="/productos" class="mc-btn mc-btn--primary">
          <span class="mc-btn__label">Ver Catálogo</span>
        </a>
      </div>
    </div>
  </section>
  <app-infinitelogomarquee [items]="marqueeItems" />
</div>

<!-- Marcas Destacadas -->
<section class="brands-section">
  <div class="section-container">
    <div class="section-header">
      <app-title variant="section" level="h2" text="Marcas Líderes" />
    </div>
  </div>
  <app-brandshowcase [items]="showcaseItems" />
</section>

<!-- Propuesta de Valor — imagen + texto alternado -->
<section class="feature-section">
  <div class="section-container">
    <div class="section-header">
      <app-title variant="section" level="h2" text="Soluciones para cada Proyecto" />
    </div>
  </div>
  <app-feature-split [items]="featureItems" />
</section>

<!-- Divisiones de negocios -->
<section class="solutions-section">
  <app-slider [images]="solutionSlides" [intervalMs]="2500" />
</section>

<!-- Equipos Destacados -->
<section class="machinery-section">
  <div class="section-container">
    <div class="section-header">
      <app-title variant="section" level="h2" text="Equipos Destacados" />
    </div>
  </div>
  <div class="machinery-grid">
    @for (equip of featuredMachinery; track equip.title) {
      <a class="mach-item" [routerLink]="equip.route" [attr.aria-label]="equip.brand + ' — ' + equip.title">
        <img class="mach-item__img" [src]="equip.image" [alt]="equip.title" loading="lazy" />
        <div class="mach-item__overlay" aria-hidden="true"></div>
        <div class="mach-item__content">
          <span class="mach-item__brand">{{ equip.brand }}</span>
          <h3 class="mach-item__title">{{ equip.title }}</h3>
          <span class="mach-item__cta">Ver marca <span aria-hidden="true">→</span></span>
        </div>
      </a>
    }
  </div>
</section>

<!-- Divisor -->
<app-textcarouselslider [tickerTexts]="serviceTickerTexts" class="services-ticker" />

<!-- Servicios -->
<app-services-accordion />

<!-- Divisor -->
<app-textcarouselslider [tickerTexts]="serviceTickerTexts" class="services-ticker" />

<!-- CTA Final -->
<app-calltoaction
  title="¿Listo para cotizar o requiere asesoría?"
  description="Póngase en contacto con nuestros asesores para cotizar equipos, programar mantenimientos o consultar stock de repuestos originales."
  bgImageUrl="https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=1600&auto=format&fit=crop"
>
  <a routerLink="/contacto" class="mc-btn mc-btn--primary">
    <span class="mc-btn__label">Contactar Asesor</span>
  </a>
</app-calltoaction>
