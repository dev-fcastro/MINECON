@if (eyebrow()) {
  <span class="mc-title__eyebrow" [style.background-color]="eyebrowColor() || null">{{ eyebrow() }}</span>
}

@if (level() === 'h1') {
  <h1 [class]="'mc-title mc-title--' + variant()" [style.color]="color() || null">{{ text() }}</h1>
} @else if (level() === 'h2') {
  <h2 [class]="'mc-title mc-title--' + variant()" [style.color]="color() || null">{{ text() }}</h2>
} @else if (level() === 'h3') {
  <h3 [class]="'mc-title mc-title--' + variant()" [style.color]="color() || null">{{ text() }}</h3>
} @else {
  <h4 [class]="'mc-title mc-title--' + variant()" [style.color]="color() || null">{{ text() }}</h4>
}
