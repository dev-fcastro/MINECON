<section
  class="cta"
  [style.background-image]="bgImageUrl() ? 'url(' + bgImageUrl() + ')' : null"
  [attr.aria-label]="title()"
>
  <div class="cta__overlay" aria-hidden="true"></div>

  <div class="cta__content">
    @if (eyebrow()) {
      <span class="cta__eyebrow">{{ eyebrow() }}</span>
    }
    <h2 class="cta__title">{{ title() }}</h2>
    @if (description()) {
      <p class="cta__description">{{ description() }}</p>
    }
    <div class="cta__actions">
      <ng-content></ng-content>
    </div>
  </div>

  <div class="cta__grid-deco" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
</section>
